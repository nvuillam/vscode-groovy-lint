name: "DOC - Build and deploy"
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # zizmor artipacked: this workflow legitimately pushes doc updates
          # via git-auto-commit-action, so credentials must persist.
          persist-credentials: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          package-manager-cache: false
          python-version: "3.x"
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          package-manager-cache: false
          node-version: "24"
      - run: |
          pip install mkdocs-material mdx_truly_sane_lists
          npm ci
          npm run compile
          npm run dev:pre-commit
          mkdocs gh-deploy --force

      # This step will evaluate the repo status and report the change
      - name: Check if there are changes
        id: changes
        if: success() || failure()
        uses: UnicornGlobal/has-changes-action@ea00e6f831a9e785271645729fa251907b314707 # v1.0.12

      # Push new commit if applicable
      - name: Prepare commit
        if: steps.changes.outputs.changed == 1
        run: sudo chown -Rc $UID .git/
      - name: Commit and push applied linter fixes
        if: steps.changes.outputs.changed == 1
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          branch: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref }}
          commit_message: "[automation] Update documentation"
